<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colour Palette</title>
    <link rel="stylesheet" href="style.css">
    <!-- FIX: Font Awesome was never linked, so the icons (fa-sync-alt, fa-copy, fa-check) were invisible -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- FIX: class=""container> was malformed -->
        <h1>Color Palette Generator</h1>
        <button id="generate-btn">
            <i class="fas fa-sync-alt"></i>
            Generate Palette
        </button>
        <div class="palette-container">
            <div class="color-box">
                <div class="color" style="background-color: #e1f5fe;"></div>
                <!-- FIX: "background: color #e1f5fe" is invalid CSS — changed to "background-color: #e1f5fe" -->
                <div class="color-info">
                    <span class="hex-value">#E1F5FE</span>
                    <i class="far fa-copy copy-btn" title="copy to clipboard"></i>
                    <!-- FIX: titl= → title=, "clipb oard" → "clipboard" -->
                </div>
            </div>
            <div class="color-box">
                <div class="color" style="background-color: #b3e5fc;"></div>
                <div class="color-info">
                    <span class="hex-value">#B3E5FC</span>
                    <i class="far fa-copy copy-btn" title="copy to clipboard"></i>
                </div>
            </div>
            <div class="color-box">
                <div class="color" style="background-color: #81d4fa;"></div>
                <div class="color-info">
                    <span class="hex-value">#81D4FA</span>
                    <i class="far fa-copy copy-btn" title="copy to clipboard"></i>
                </div>
            </div>
            <div class="color-box">
                <div class="color" style="background-color: #4fc3f7;"></div>
                <div class="color-info">
                    <span class="hex-value">#4FC3F7</span>
                    <i class="far fa-copy copy-btn" title="copy to clipboard"></i>
                </div>
            </div>
            <div class="color-box">
                <div class="color" style="background-color: #29b6f6;"></div>
                <div class="color-info">
                    <span class="hex-value">#29B6F6</span>
                    <i class="far fa-copy copy-btn" title="copy to clipboard"></i>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
